name: build-lpac-openwrt-musl-aarch64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    env:
      SDK_TAG: aarch64_cortex-a53-24.10.5

    steps:
      - name: Checkout lpac repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare custom OpenWrt package feed
        shell: bash
        run: |
          set -eux

          mkdir -p openwrt-feed/lpac

          cat > openwrt-feed/lpac/Makefile <<'EOF'
          include $(TOPDIR)/rules.mk

          PKG_NAME:=lpac
          PKG_VERSION:=2.3.0
          PKG_RELEASE:=1

          PKG_SOURCE_PROTO:=git
          PKG_SOURCE_URL:=file:///work
          PKG_SOURCE_VERSION:=$(shell cd /work && git rev-parse HEAD)
          PKG_MIRROR_HASH:=skip

          PKG_LICENSE:=AGPL-3.0-only LGPL-2.0-only
          PKG_MAINTAINER:=custom
          PKG_BUILD_PARALLEL:=1
          CMAKE_INSTALL:=1

          include $(INCLUDE_DIR)/package.mk
          include $(INCLUDE_DIR)/cmake.mk

          define Package/lpac
            SECTION:=utils
            CATEGORY:=Utilities
            TITLE:=eUICC eSIM LPA written in C
            URL:=https://github.com/estkme-group/lpac
            DEPENDS:=+libcurl +libqmi +libqrtr-glib
          endef

          define Package/lpac/description
            lpac built from git with QMI and QMI-over-QRTR enabled.
          endef

          TARGET_CFLAGS += $(FPIC)

          CMAKE_OPTIONS += \
            -DUSE_SYSTEM_DEPS=ON \
            -DSTANDALONE_MODE=OFF \
            -DLPAC_WITH_HTTP_CURL=ON \
            -DLPAC_WITH_APDU_PCSC=OFF \
            -DLPAC_WITH_APDU_AT=OFF \
            -DLPAC_WITH_APDU_GBINDER=OFF \
            -DLPAC_WITH_APDU_UQMI=OFF \
            -DLPAC_WITH_APDU_MBIM=OFF \
            -DLPAC_WITH_APDU_QMI=ON \
            -DLPAC_WITH_APDU_QMI_QRTR=ON

          define Package/lpac/install
          	$(INSTALL_DIR) $(1)/usr/bin
          	$(INSTALL_BIN) $(PKG_INSTALL_DIR)/usr/bin/lpac $(1)/usr/bin/lpac

          	$(INSTALL_DIR) $(1)/usr/lib
          	[ ! -d $(PKG_INSTALL_DIR)/usr/lib/lpac ] || $(CP) $(PKG_INSTALL_DIR)/usr/lib/lpac $(1)/usr/lib/
          	[ ! -f $(PKG_INSTALL_DIR)/usr/lib/libeuicc-drivers.so ] || $(CP) $(PKG_INSTALL_DIR)/usr/lib/libeuicc-drivers.so* $(1)/usr/lib/
          	[ ! -f $(PKG_INSTALL_DIR)/usr/lib/libeuicc-driver-loader.so ] || $(CP) $(PKG_INSTALL_DIR)/usr/lib/libeuicc-driver-loader.so* $(1)/usr/lib/
          endef

          $(eval $(call BuildPackage,lpac))
          EOF

      - name: Build inside OpenWrt SDK
        shell: bash
        run: |
          set -eux

          docker pull openwrt/sdk:${SDK_TAG}

          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/work" \
            -w /builder \
            openwrt/sdk:${SDK_TAG} \
            bash -lc '
              set -eux

              [ -d ./scripts ] || ./setup.sh

              echo "src-link custom /work/openwrt-feed" >> feeds.conf.default

              ./scripts/feeds update -a
              ./scripts/feeds install -a

              cat > .config <<CFG
              CONFIG_ALL_NONSHARED=n
              CONFIG_ALL_KMODS=n
              CONFIG_PACKAGE_lpac=y
              CONFIG_PACKAGE_libcurl=y
              CONFIG_PACKAGE_libqmi=y
              CONFIG_PACKAGE_libqrtr-glib=y
              CFG

              make defconfig
              make package/feeds/custom/lpac/compile V=s -j"$(nproc)"

              PKG_DIR="$(find build_dir/target-*/lpac-*/ipkg-install -type d | head -n1)"
              test -n "$PKG_DIR"

              mkdir -p /work/dist
              mkdir -p /work/out

              cp -a "$PKG_DIR"/usr /work/out/

              file /work/out/usr/bin/lpac || true
              readelf -l /work/out/usr/bin/lpac | grep interpreter || true
              readelf -d /work/out/usr/bin/lpac | grep NEEDED || true

              tar -C /work/out -czf /work/dist/lpac-openwrt-aarch64-musl-qmi-qrtr.tar.gz usr
            '

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lpac-openwrt-aarch64-musl-qmi-qrtr
          path: dist/lpac-openwrt-aarch64-musl-qmi-qrtr.tar.gz
