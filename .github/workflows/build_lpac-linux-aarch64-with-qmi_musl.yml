name: build-lpac-openwrt-aarch64-musl-qmi

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    env:
      SDK_TAG: aarch64_cortex-a53-24.10.5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build in OpenWrt SDK
        shell: bash
        run: |
          set -euxo pipefail

          docker pull openwrt/sdk:${SDK_TAG}

          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/work" \
            -w /builder \
            openwrt/sdk:${SDK_TAG} \
            /bin/bash -lc '
              set -euxo pipefail

              if [ ! -d ./scripts ]; then
                ./setup.sh
              fi

              ./scripts/feeds update -a

              # Устанавливаем только build-зависимости, близкие к setup-qmi.sh upstream
              ./scripts/feeds install libcurl
              ./scripts/feeds install libmbim
              ./scripts/feeds install libqmi
              ./scripts/feeds install libqrtr-glib
              ./scripts/feeds install glib2
              ./scripts/feeds install pkgconf

              make defconfig

              TOOLCHAIN_BIN="$(find staging_dir/toolchain-* -type d -path "*/bin" | head -n1)"
              STAGING_DIR_TARGET="$(find staging_dir/target-* -maxdepth 0 -type d | head -n1)"
              test -n "$TOOLCHAIN_BIN"
              test -n "$STAGING_DIR_TARGET"

              export PATH="$TOOLCHAIN_BIN:$PATH"
              export CC=aarch64-openwrt-linux-musl-gcc
              export CXX=aarch64-openwrt-linux-musl-g++
              export AR=aarch64-openwrt-linux-musl-gcc-ar
              export RANLIB=aarch64-openwrt-linux-musl-gcc-ranlib
              export STRIP=aarch64-openwrt-linux-musl-strip

              export CFLAGS="-Os -pipe"
              export CXXFLAGS="-Os -pipe"
              export LDFLAGS="-Wl,-rpath,/usr/lib/lpac"

              rm -rf /work/build /work/stage /work/dist
              mkdir -p /work/build /work/stage /work/dist

              cmake -S /work -B /work/build \
                -G "Unix Makefiles" \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_SYSTEM_NAME=Linux \
                -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
                -DCMAKE_INSTALL_PREFIX=/usr \
                -DCMAKE_C_COMPILER="$CC" \
                -DCMAKE_CXX_COMPILER="$CXX" \
                -DCMAKE_FIND_ROOT_PATH="$STAGING_DIR_TARGET" \
                -DCMAKE_FIND_ROOT_PATH_MODE_PROGRAM=NEVER \
                -DCMAKE_FIND_ROOT_PATH_MODE_LIBRARY=ONLY \
                -DCMAKE_FIND_ROOT_PATH_MODE_INCLUDE=ONLY \
                -DCMAKE_FIND_ROOT_PATH_MODE_PACKAGE=ONLY \
                -DCMAKE_PREFIX_PATH="$STAGING_DIR_TARGET/usr" \
                -DCMAKE_INSTALL_RPATH=/usr/lib/lpac \
                -DLPAC_WITH_APDU_QMI=ON \
                -DLPAC_WITH_APDU_QMI_QRTR=ON \
                -DLPAC_WITH_APDU_MBIM=ON

              cmake --build /work/build -j"$(nproc)"
              DESTDIR=/work/stage cmake --install /work/build

              file /work/build/src/lpac || true
              readelf -l /work/build/src/lpac | grep interpreter || true
              readelf -d /work/build/src/lpac | grep NEEDED || true

              tar -C /work/stage -czf /work/dist/lpac-openwrt-aarch64-musl-qmi.tar.gz usr
            '

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lpac-openwrt-aarch64-musl-qmi
          path: dist/lpac-openwrt-aarch64-musl-qmi.tar.gz
