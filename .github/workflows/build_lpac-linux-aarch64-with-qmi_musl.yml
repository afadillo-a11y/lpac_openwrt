name: build-lpac-openwrt-aarch64-qmi

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    env:
      SDK_TAG: aarch64_cortex-a53-24.10.5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create custom OpenWrt package
        shell: bash
        run: |
          set -euxo pipefail

          mkdir -p openwrt-feed/lpac

          cat > openwrt-feed/lpac/Makefile <<'EOF'
          include $(TOPDIR)/rules.mk

          PKG_NAME:=lpac
          PKG_VERSION:=2.3.0
          PKG_RELEASE:=1

          PKG_SOURCE_PROTO:=git
          PKG_SOURCE_URL:=file:///work
          PKG_SOURCE_VERSION:=HEAD
          PKG_MIRROR_HASH:=skip

          PKG_LICENSE:=AGPL-3.0-only LGPL-2.0-only
          PKG_MAINTAINER:=custom
          PKG_BUILD_PARALLEL:=1
          CMAKE_INSTALL:=1

          include $(INCLUDE_DIR)/package.mk
          include $(INCLUDE_DIR)/cmake.mk

          define Package/lpac
            SECTION:=utils
            CATEGORY:=Utilities
            TITLE:=eUICC eSIM LPA written in C
            URL:=https://github.com/estkme-group/lpac
            DEPENDS:=+libcurl +libqmi +libqrtr-glib
          endef

          define Package/lpac/description
            lpac built from the checked out git tree with QMI and QMI-over-QRTR enabled.
          endef

          TARGET_CFLAGS += $(FPIC)

          CMAKE_OPTIONS += \
            -DUSE_SYSTEM_DEPS=ON \
            -DSTANDALONE_MODE=OFF \
            -DLPAC_WITH_HTTP_CURL=ON \
            -DLPAC_WITH_APDU_PCSC=OFF \
            -DLPAC_WITH_APDU_AT=OFF \
            -DLPAC_WITH_APDU_GBINDER=OFF \
            -DLPAC_WITH_APDU_UQMI=OFF \
            -DLPAC_WITH_APDU_MBIM=OFF \
            -DLPAC_WITH_APDU_QMI=ON \
            -DLPAC_WITH_APDU_QMI_QRTR=ON

          define Package/lpac/install
          	$(INSTALL_DIR) $(1)/usr/bin
          	$(INSTALL_BIN) $(PKG_INSTALL_DIR)/usr/bin/lpac $(1)/usr/bin/lpac

          	$(INSTALL_DIR) $(1)/usr/lib
          	if [ -d "$(PKG_INSTALL_DIR)/usr/lib/lpac" ]; then \
          		$(CP) $(PKG_INSTALL_DIR)/usr/lib/lpac $(1)/usr/lib/; \
          	fi
          	if [ -f "$(PKG_INSTALL_DIR)/usr/lib/libeuicc-drivers.so" ]; then \
          		$(CP) $(PKG_INSTALL_DIR)/usr/lib/libeuicc-drivers.so* $(1)/usr/lib/; \
          	fi
          	if [ -f "$(PKG_INSTALL_DIR)/usr/lib/libeuicc-driver-loader.so" ]; then \
          		$(CP) $(PKG_INSTALL_DIR)/usr/lib/libeuicc-driver-loader.so* $(1)/usr/lib/; \
          	fi
          endef

          $(eval $(call BuildPackage,lpac))
          EOF

      - name: Build in OpenWrt SDK container
        shell: bash
        run: |
          set -euxo pipefail

          docker pull openwrt/sdk:${SDK_TAG}

          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/work" \
            -w /builder \
            openwrt/sdk:${SDK_TAG} \
            /bin/bash -lc '
              set -euxo pipefail

              [ -d ./scripts ] || ./setup.sh

              echo "src-link custom /work/openwrt-feed" >> feeds.conf.default

              ./scripts/feeds update -a
              ./scripts/feeds install -p custom lpac

              cat > .config <<'"'"'CFG'"'"'
CONFIG_PACKAGE_lpac=y
CFG

              make defconfig
              make package/feeds/custom/lpac/{clean,compile} V=s -j"$(nproc)"

              mkdir -p /work/dist /work/unpack

              IPK="$(find bin/packages -type f -name "lpac_*.ipk" | head -n1)"
              test -n "$IPK"

              cp -v "$IPK" /work/dist/

              cd /work/unpack
              ar x "$IPK"
              tar -xf data.tar.gz

              file ./usr/bin/lpac
              readelf -l ./usr/bin/lpac | grep interpreter || true
              readelf -d ./usr/bin/lpac | grep NEEDED || true

              tar -czf /work/dist/lpac-openwrt-aarch64-qmi-qrtr.tar.gz usr
            '

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lpac-openwrt-aarch64-qmi-qrtr
          path: |
            dist/lpac-openwrt-aarch64-qmi-qrtr.tar.gz
            dist/lpac_*.ipk
