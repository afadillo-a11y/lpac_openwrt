name: build-lpac-openwrt-aarch64-musl-qmi

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    env:
      SDK_TAG: aarch64_cortex-a53-24.10.5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare custom OpenWrt package and helper script
        shell: bash
        run: |
          set -euxo pipefail

          mkdir -p openwrt-feed/lpac
          mkdir -p .github/openwrt-helper

          cat > openwrt-feed/lpac/Makefile <<'EOF'
          include $(TOPDIR)/rules.mk

          PKG_NAME:=lpac
          PKG_VERSION:=2.3.0
          PKG_RELEASE:=1

          PKG_SOURCE_PROTO:=git
          PKG_SOURCE_URL:=file:///work
          PKG_SOURCE_VERSION:=$(shell git -C /work rev-parse HEAD)
          PKG_MIRROR_HASH:=skip

          PKG_LICENSE:=AGPL-3.0-only LGPL-2.0-only
          PKG_MAINTAINER:=custom
          PKG_BUILD_PARALLEL:=1
          CMAKE_INSTALL:=1
          PKG_BUILD_DEPENDS:=pkgconf/host

          include $(INCLUDE_DIR)/package.mk
          include $(INCLUDE_DIR)/cmake.mk

          define Package/lpac
            SECTION:=utils
            CATEGORY:=Utilities
            TITLE:=eUICC eSIM LPA
            URL:=https://github.com/estkme-group/lpac
            DEPENDS:=+libcurl +libmbim +libqmi +libqrtr-glib +glib2
          endef

          define Package/lpac/description
            lpac built for OpenWrt with QMI/QRTR/MBIM backends enabled.
          endef

          CMAKE_OPTIONS += \
            -DLPAC_WITH_APDU_PCSC=OFF \
            -DLPAC_WITH_APDU_AT=OFF \
            -DLPAC_WITH_APDU_UQMI=OFF \
            -DLPAC_WITH_APDU_QMI=ON \
            -DLPAC_WITH_APDU_QMI_QRTR=ON \
            -DLPAC_WITH_APDU_MBIM=ON

          define Package/lpac/install
          @$(INSTALL_DIR) $(1)/usr/bin
          @$(INSTALL_BIN) $(PKG_INSTALL_DIR)/usr/bin/lpac $(1)/usr/bin/lpac
          @if [ -d "$(PKG_INSTALL_DIR)/usr/lib/lpac" ]; then \
          @  $(INSTALL_DIR) $(1)/usr/lib; \
          @  $(CP) $(PKG_INSTALL_DIR)/usr/lib/lpac $(1)/usr/lib/; \
          @fi
          @if ls $(PKG_INSTALL_DIR)/usr/lib/libeuicc*.so* >/dev/null 2>&1; then \
          @  $(INSTALL_DIR) $(1)/usr/lib; \
          @  $(CP) $(PKG_INSTALL_DIR)/usr/lib/libeuicc*.so* $(1)/usr/lib/; \
          @fi
          endef

          $(eval $(call BuildPackage,lpac))
          EOF

          # Защита от потери табуляции в YAML
          sed -i 's/^@/\t/' openwrt-feed/lpac/Makefile

          cat > .github/openwrt-helper/build.sh <<'EOF'
          #!/bin/bash
          set -euxo pipefail

          git config --global --add safe.directory /work
          cd /builder

          if [ ! -d ./scripts ]; then
            ./setup.sh
          fi

          echo "src-link custom /work/openwrt-feed" >> feeds.conf.default

          ./scripts/feeds update -a

          # --- БЭКПОРТ СВЕЖЕЙ ВЕРСИИ LIBQMI ИЗ ВЕТКИ MASTER ---
          echo "Подменяем старый libqmi (1.34.0) на свежую версию из master (>=1.36.0)..."
          rm -rf feeds/packages/libs/libqmi
          git clone --depth 1 https://github.com/openwrt/packages.git /tmp/pkg-master
          cp -r /tmp/pkg-master/libs/libqmi feeds/packages/libs/
          # -----------------------------------------------------

          ./scripts/feeds install -p custom lpac
          ./scripts/feeds install libcurl libmbim libqmi libqrtr-glib glib2 pkgconf

          cat >> .config <<'CFG'
          CONFIG_PACKAGE_lpac=y
          CONFIG_PACKAGE_libcurl=y
          CONFIG_PACKAGE_libmbim=y
          CONFIG_PACKAGE_libqmi=y
          CONFIG_PACKAGE_libqrtr-glib=y
          CONFIG_PACKAGE_glib2=y
          CFG

          make defconfig

          # Явная последовательная сборка для предотвращения гонки потоков
          make package/glib2/compile V=s -j"$(nproc)"
          make package/libmbim/compile V=s -j"$(nproc)"
          make package/libqmi/compile V=s -j"$(nproc)"
          make package/libqrtr-glib/compile V=s -j"$(nproc)"
          make package/curl/compile V=s -j"$(nproc)"
          
          # Сборка lpac
          make package/feeds/custom/lpac/compile V=s -j"$(nproc)"

          mkdir -p /work/dist /tmp/lpac-unpack

          IPK="$(find bin/packages -type f -name 'lpac_*.ipk' | head -n1)"
          if [ -z "$IPK" ]; then
            echo "Ошибка: Собранный IPK пакет не найден!"
            exit 1
          fi

          # Копируем и переименовываем пакет для удобства (RAX3000M)
          FINAL_IPK="lpac_2.3.0-1_aarch64_cortex-a53.ipk"
          cp -v "$IPK" "/work/dist/$FINAL_IPK"

          # Распаковываем для tar.gz архива
          cd /tmp/lpac-unpack
          ar x "/work/dist/$FINAL_IPK"
          tar -xf data.tar.*

          file ./usr/bin/lpac || true
          readelf -d ./usr/bin/lpac | grep NEEDED || true

          tar -czf /work/dist/lpac-openwrt-aarch64-musl-qmi.tar.gz usr
          EOF

          chmod +x .github/openwrt-helper/build.sh

      - name: Build in OpenWrt SDK
        shell: bash
        run: |
          set -euxo pipefail
          docker pull openwrt/sdk:${SDK_TAG}
          docker run --rm \
            --user root \
            -v "${GITHUB_WORKSPACE}:/work" \
            -w /builder \
            openwrt/sdk:${SDK_TAG} \
            /bin/bash /work/.github/openwrt-helper/build.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lpac-rax3000m-package
          path: |
            dist/*.ipk
            dist/*.tar.gz
