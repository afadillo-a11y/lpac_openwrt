name: build-lpac-openwrt-aarch64-musl-qmi

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    env:
      SDK_TAG: aarch64_cortex-a53-24.10.5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build in OpenWrt SDK
        shell: bash
        run: |
          set -euxo pipefail

          docker pull openwrt/sdk:${SDK_TAG}

          docker run --rm \
            --user root \
            -v "${GITHUB_WORKSPACE}:/work" \
            -w /builder \
            openwrt/sdk:${SDK_TAG} \
            /bin/bash -lc '
              set -euxo pipefail

              if [ ! -d ./scripts ]; then
                ./setup.sh
              fi

              if command -v apt-get >/dev/null 2>&1; then
                apt-get update
                DEBIAN_FRONTEND=noninteractive apt-get install -y \
                  cmake \
                  pkg-config \
                  file \
                  binutils
              elif command -v apk >/dev/null 2>&1; then
                apk update
                apk add \
                  cmake \
                  pkgconf \
                  file \
                  binutils
              elif command -v dnf >/dev/null 2>&1; then
                dnf install -y \
                  cmake \
                  pkgconf-pkg-config \
                  file \
                  binutils
              else
                echo "No supported package manager found to install cmake"
                exit 1
              fi

              ./scripts/feeds update -a
              ./scripts/feeds install libcurl
              ./scripts/feeds install libmbim
              ./scripts/feeds install libqmi
              ./scripts/feeds install libqrtr-glib
              ./scripts/feeds install glib2
              ./scripts/feeds install pkgconf

              make defconfig

              TOOLCHAIN_BIN="$(find staging_dir/toolchain-* -type d -path "*/bin" | head -n1)"
              STAGING_DIR_TARGET="$(find staging_dir/target-* -maxdepth 0 -type d | head -n1)"

              test -n "$TOOLCHAIN_BIN"
              test -n "$STAGING_DIR_TARGET"

              export PATH="$TOOLCHAIN_BIN:$PATH"
              export CC=aarch64-openwrt-linux-musl-gcc
              export CXX=aarch64-openwrt-linux-musl-g++
              export AR=aarch64-openwrt-linux-musl-gcc-ar
              export RANLIB=aarch64-openwrt-linux-musl-gcc-ranlib
              export STRIP=aarch64-openwrt-linux-musl-strip

              export CFLAGS="-Os -pipe"
              export CXXFLAGS="-Os -pipe"
              export LDFLAGS="-Wl,-rpath,/usr/lib/lpac"

              export PKG_CONFIG_SYSROOT_DIR="$STAGING_DIR_TARGET"
              export PKG_CONFIG_PATH="$STAGING_DIR_TARGET/usr/lib/pkgconfig:$STAGING_DIR_TARGET/usr/share/pkgconfig"
              export PKG_CONFIG_LIBDIR="$STAGING_DIR_TARGET/usr/lib/pkgconfig:$STAGING_DIR_TARGET/usr/share/pkgconfig"

              rm -rf /tmp/lpac-build /tmp/lpac-stage /tmp/lpac-dist
              mkdir -p /tmp/lpac-build /tmp/lpac-stage /tmp/lpac-dist

              cmake -S /work -B /tmp/lpac-build \
                -G "Unix Makefiles" \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_SYSTEM_NAME=Linux \
                -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
                -DCMAKE_INSTALL_PREFIX=/usr \
                -DCMAKE_C_COMPILER="$CC" \
                -DCMAKE_CXX_COMPILER="$CXX" \
                -DCMAKE_FIND_ROOT_PATH="$STAGING_DIR_TARGET" \
                -DCMAKE_FIND_ROOT_PATH_MODE_PROGRAM=NEVER \
                -DCMAKE_FIND_ROOT_PATH_MODE_LIBRARY=ONLY \
                -DCMAKE_FIND_ROOT_PATH_MODE_INCLUDE=ONLY \
                -DCMAKE_FIND_ROOT_PATH_MODE_PACKAGE=ONLY \
                -DCMAKE_PREFIX_PATH="$STAGING_DIR_TARGET/usr" \
                -DCMAKE_INSTALL_RPATH=/usr/lib/lpac \
                -DLPAC_WITH_APDU_QMI=ON \
                -DLPAC_WITH_APDU_QMI_QRTR=ON \
                -DLPAC_WITH_APDU_MBIM=ON

              cmake --build /tmp/lpac-build -j"$(nproc)"
              DESTDIR=/tmp/lpac-stage cmake --install /tmp/lpac-build

              file /tmp/lpac-build/src/lpac || true
              readelf -l /tmp/lpac-build/src/lpac | grep interpreter || true
              readelf -d /tmp/lpac-build/src/lpac | grep NEEDED || true

              tar -C /tmp/lpac-stage -czf /tmp/lpac-dist/lpac-openwrt-aarch64-musl-qmi.tar.gz usr
              cp -f /tmp/lpac-dist/lpac-openwrt-aarch64-musl-qmi.tar.gz /work/
            '

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lpac-openwrt-aarch64-musl-qmi
          path: lpac-openwrt-aarch64-musl-qmi.tar.gz
